name: 783 error

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13]
       

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Uninstall Homebrew
      run: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)"
        
    - name: Install dependencies
      run: |
        # Download and install OpenSSL
        curl -O https://www.openssl.org/source/openssl-1.1.1u.tar.gz
        tar -xzf openssl-1.1.1u.tar.gz
        cd openssl-1.1.1u
        ./config
        make
        sudo make install
        cd ..
        
        # Download gettext source
        curl -O http://ftp.gnu.org/gnu/gettext/gettext-0.21.1.tar.gz
        tar -xzf gettext-0.21.1.tar.gz
        cd gettext-0.21.1
        
        # Build and install gettext
        ./configure
        make
        sudo make install
        cd ..

        # Setup Python environment variables to include OpenSSL
        export LDFLAGS="-L/usr/local/ssl/lib"
        export CPPFLAGS="-I/usr/local/ssl/include"
        export PKG_CONFIG_PATH="/usr/local/ssl/lib/pkgconfig"

      
    - name: Set up Python 
      uses: actions/setup-python@v4
      with:
        python-version: 3.10.13
      
    - name: Run Python3.10.13
      run: python --version
